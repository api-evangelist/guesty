naftiko: 1.0.0-alpha2
info:
  label: Guesty Open API — Conversations
  description: 'Guesty Open API — Conversations. 1 operations. Lead operation: List conversations. Self-contained Naftiko
    capability covering one Guesty business surface.'
  tags:
  - Guesty
  - Conversations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GUESTY_API_KEY: GUESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: guesty-conversations
    baseUri: https://open-api.guesty.com
    description: Guesty Open API — Conversations business capability. Self-contained, no shared references.
    resources:
    - name: communication-conversations
      path: /communication-conversations
      operations:
      - name: listconversations
        method: GET
        description: List conversations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GUESTY_API_KEY}}'
  exposes:
  - type: rest
    namespace: guesty-conversations-rest
    port: 8080
    description: REST adapter for Guesty Open API — Conversations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/communication-conversations
      name: communication-conversations
      description: REST surface for communication-conversations.
      operations:
      - method: GET
        name: listconversations
        description: List conversations
        call: guesty-conversations.listconversations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: guesty-conversations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Guesty Open API — Conversations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-conversations
      description: List conversations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guesty-conversations.listconversations
      outputParameters:
      - type: object
        mapping: $.
