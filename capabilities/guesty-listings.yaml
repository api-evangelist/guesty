naftiko: 1.0.0-alpha2
info:
  label: Guesty Open API — Listings
  description: 'Guesty Open API — Listings. 3 operations. Lead operation: List listings. Self-contained Naftiko capability
    covering one Guesty business surface.'
  tags:
  - Guesty
  - Listings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GUESTY_API_KEY: GUESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: guesty-listings
    baseUri: https://open-api.guesty.com
    description: Guesty Open API — Listings business capability. Self-contained, no shared references.
    resources:
    - name: listings
      path: /listings
      operations:
      - name: listlistings
        method: GET
        description: List listings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: skip
          in: query
          type: integer
      - name: createlisting
        method: POST
        description: Create listing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: listings-id
      path: /listings/{id}
      operations:
      - name: getlisting
        method: GET
        description: Get listing by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GUESTY_API_KEY}}'
  exposes:
  - type: rest
    namespace: guesty-listings-rest
    port: 8080
    description: REST adapter for Guesty Open API — Listings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/listings
      name: listings
      description: REST surface for listings.
      operations:
      - method: GET
        name: listlistings
        description: List listings
        call: guesty-listings.listlistings
        with:
          limit: rest.limit
          skip: rest.skip
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlisting
        description: Create listing
        call: guesty-listings.createlisting
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/listings/{id}
      name: listings-id
      description: REST surface for listings-id.
      operations:
      - method: GET
        name: getlisting
        description: Get listing by id
        call: guesty-listings.getlisting
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: guesty-listings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Guesty Open API — Listings. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-listings
      description: List listings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guesty-listings.listlistings
      with:
        limit: tools.limit
        skip: tools.skip
      outputParameters:
      - type: object
        mapping: $.
    - name: create-listing
      description: Create listing
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: guesty-listings.createlisting
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-listing-id
      description: Get listing by id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guesty-listings.getlisting
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
