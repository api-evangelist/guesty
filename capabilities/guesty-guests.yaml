naftiko: 1.0.0-alpha2
info:
  label: Guesty Open API — Guests
  description: 'Guesty Open API — Guests. 2 operations. Lead operation: List guests. Self-contained Naftiko capability covering
    one Guesty business surface.'
  tags:
  - Guesty
  - Guests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GUESTY_API_KEY: GUESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: guesty-guests
    baseUri: https://open-api.guesty.com
    description: Guesty Open API — Guests business capability. Self-contained, no shared references.
    resources:
    - name: guests
      path: /guests
      operations:
      - name: listguests
        method: GET
        description: List guests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: guests-id
      path: /guests/{id}
      operations:
      - name: getguest
        method: GET
        description: Get guest by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GUESTY_API_KEY}}'
  exposes:
  - type: rest
    namespace: guesty-guests-rest
    port: 8080
    description: REST adapter for Guesty Open API — Guests. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/guests
      name: guests
      description: REST surface for guests.
      operations:
      - method: GET
        name: listguests
        description: List guests
        call: guesty-guests.listguests
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/guests/{id}
      name: guests-id
      description: REST surface for guests-id.
      operations:
      - method: GET
        name: getguest
        description: Get guest by id
        call: guesty-guests.getguest
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: guesty-guests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Guesty Open API — Guests. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-guests
      description: List guests
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guesty-guests.listguests
      outputParameters:
      - type: object
        mapping: $.
    - name: get-guest-id
      description: Get guest by id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guesty-guests.getguest
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
