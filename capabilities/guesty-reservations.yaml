naftiko: 1.0.0-alpha2
info:
  label: Guesty Open API — Reservations
  description: 'Guesty Open API — Reservations. 3 operations. Lead operation: List reservations. Self-contained Naftiko capability
    covering one Guesty business surface.'
  tags:
  - Guesty
  - Reservations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GUESTY_API_KEY: GUESTY_API_KEY
capability:
  consumes:
  - type: http
    namespace: guesty-reservations
    baseUri: https://open-api.guesty.com
    description: Guesty Open API — Reservations business capability. Self-contained, no shared references.
    resources:
    - name: reservations
      path: /reservations
      operations:
      - name: listreservations
        method: GET
        description: List reservations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: skip
          in: query
          type: integer
      - name: createreservation
        method: POST
        description: Create reservation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: reservations-id
      path: /reservations/{id}
      operations:
      - name: getreservation
        method: GET
        description: Get reservation by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GUESTY_API_KEY}}'
  exposes:
  - type: rest
    namespace: guesty-reservations-rest
    port: 8080
    description: REST adapter for Guesty Open API — Reservations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/reservations
      name: reservations
      description: REST surface for reservations.
      operations:
      - method: GET
        name: listreservations
        description: List reservations
        call: guesty-reservations.listreservations
        with:
          limit: rest.limit
          skip: rest.skip
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createreservation
        description: Create reservation
        call: guesty-reservations.createreservation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reservations/{id}
      name: reservations-id
      description: REST surface for reservations-id.
      operations:
      - method: GET
        name: getreservation
        description: Get reservation by id
        call: guesty-reservations.getreservation
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: guesty-reservations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Guesty Open API — Reservations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-reservations
      description: List reservations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guesty-reservations.listreservations
      with:
        limit: tools.limit
        skip: tools.skip
      outputParameters:
      - type: object
        mapping: $.
    - name: create-reservation
      description: Create reservation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: guesty-reservations.createreservation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-reservation-id
      description: Get reservation by id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: guesty-reservations.getreservation
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
